
services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos123
      POSTGRES_DB: posdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres_data: