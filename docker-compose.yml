services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aukani}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aukani_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aukani_pos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aukani}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: